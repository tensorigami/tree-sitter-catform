name = "Catform"
grammar = "catform"
path_suffixes = ["cat"]
line_comments = ["// "]
block_comment = ["/*", "*/"]
brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
]
autoclose_before = ";:.,=}])>"
word_characters = ["_"]
